<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Cuarto - Hospital</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --secondary-blue: #34495e;
            --accent-green: #27ae60;
            --danger-red: #c0392b;
            --warning-orange: #d35400;
            --safe-blue: #2980b9;
            --bg-dark: #121212;
            --text-light: #ecf0f1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- VISTA PRINCIPAL (IDLE) --- */
        #idle-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        .btn-top-left { position: absolute; top: 20px; left: 20px; font-size: 2.5em; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-top-right { position: absolute; top: 20px; right: 20px; font-size: 1.5em; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); color: white; }
        
        /* Ocultar botón fullscreen cuando ya está en fullscreen */
        :fullscreen .btn-top-right { display: none; }

        .room-number { font-size: 8em; font-weight: bold; margin: 0; color: var(--accent-green); transition: font-size 0.3s; line-height: 1; }
        .patient-name { font-size: 4em; font-weight: 300; margin: 20px 0; }
        .anon-mode .room-number { font-size: 15em; } /* Más grande si es anónimo */
        
        .observations-box {
            margin-top: 30px;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 2em;
            max-width: 80%;
            border-left: 10px solid gray;
            background: rgba(255,255,255,0.05);
        }
        .obs-baja { border-color: var(--safe-blue); }
        .obs-media { border-color: var(--warning-orange); }
        .obs-alta { border-color: var(--danger-red); }

        /* --- MODAL PIN --- */
        #pin-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .pin-display { font-size: 4em; letter-spacing: 15px; margin-bottom: 30px; height: 60px; font-weight: bold; color: var(--accent-green);}
        .pin-pad { display: grid; grid-template-columns: repeat(3, 100px); gap: 15px; }
        .pin-btn { 
            width: 100px; height: 100px; font-size: 2.5em; border-radius: 50%; border: 2px solid var(--secondary-blue);
            background: transparent; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .pin-btn:active { background: var(--secondary-blue); }
        .pin-btn-cancel { grid-column: 2; background: var(--danger-red); border-color: var(--danger-red); }
        
        /* Animación de error */
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .pin-error { animation: shake 0.4s; background-color: rgba(192, 57, 43, 0.4) !important; }

        /* --- VISTA POS (INSUMOS) --- */
        #pos-view {
            display: none; flex: 1; flex-direction: column; background: #ecf0f1; color: var(--text-dark);
        }
        header { background: var(--primary-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.5em; }
        .main-pos { display: flex; flex: 1; overflow: hidden; }
        
        .inventory-list { flex: 2; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; align-content: start; }
        .item-card { 
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s;
        }
        .item-card:active { transform: scale(0.95); border-color: var(--accent-green); }
        .item-name { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .item-stock { font-size: 0.9em; color: gray; }

        .cart-sidebar { flex: 1; background: white; border-left: 2px solid var(--border-color); display: flex; flex-direction: column; }
        .cart-header { background: var(--secondary-blue); color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold;}
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 1.2em;}
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 40px; height: 40px; border: none; background: var(--primary-blue); color: white; font-size: 1.5em; border-radius: 5px; cursor: pointer; }
        
        .cart-footer { padding: 20px; background: #f8f9fa; border-top: 1px solid #ddd; }
        .btn-confirm { width: 100%; padding: 20px; font-size: 2em; background: var(--accent-green); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancel-pos { width: 100%; padding: 15px; font-size: 1.2em; background: var(--danger-red); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; }

    </style>
</head>
<body>

    <div id="idle-view">
        <button class="btn-top-right" onclick="toggleFullscreen()">🖵 Pantalla Completa</button>
        <div class="btn-top-left" onclick="abrirPin()">💼</div>

        <div id="idle-content">
            <h1 class="room-number" id="display-room">--</h1>
            <h2 class="patient-name" id="display-name">Esperando paciente...</h2>
            
            <div class="observations-box obs-baja" id="display-obs-box" style="display: none;">
                <span id="display-obs-text"></span>
            </div>
        </div>
    </div>

    <div id="pin-overlay">
        <div class="pin-display" id="pin-dots"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="addPin('1')">1</button>
            <button class="pin-btn" onclick="addPin('2')">2</button>
            <button class="pin-btn" onclick="addPin('3')">3</button>
            <button class="pin-btn" onclick="addPin('4')">4</button>
            <button class="pin-btn" onclick="addPin('5')">5</button>
            <button class="pin-btn" onclick="addPin('6')">6</button>
            <button class="pin-btn" onclick="addPin('7')">7</button>
            <button class="pin-btn" onclick="addPin('8')">8</button>
            <button class="pin-btn" onclick="addPin('9')">9</button>
            <button class="pin-btn pin-btn-cancel" onclick="cerrarPin()">X</button>
            <button class="pin-btn" style="grid-column: 3;" onclick="addPin('0')">0</button>
        </div>
    </div>

    <div id="pos-view">
        <header>
            <div>Cuarto: <strong id="pos-room-header">--</strong></div>
            <div>Enfermero/a: <strong id="pos-employee-name">--</strong></div>
        </header>
        <div class="main-pos">
            <div class="inventory-list" id="pos-inventory-grid">
                </div>
            <div class="cart-sidebar">
                <div class="cart-header">Lista de Insumos a Cargar</div>
                <div class="cart-items" id="pos-cart-list">
                    </div>
                <div class="cart-footer">
                    <button class="btn-confirm" id="btn-procesar-tablet" onclick="confirmarInsumos()">✅ Confirmar</button>
                    <button class="btn-cancel-pos" onclick="salirPOS()">Cerrar Sesión (Volver)</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, getDocs, doc, writeBatch, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        authDomain: "hospital1-admin.firebaseapp.com",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // EXPORTAR A VENTANA GLOBAL
    window.toggleFullscreen = toggleFullscreen;
    window.abrirPin = abrirPin;
    window.cerrarPin = cerrarPin;
    window.addPin = addPin;
    window.salirPOS = salirPOS;
    window.agregarItem = agregarItem;
    window.modificarQty = modificarQty;
    window.confirmarInsumos = confirmarInsumos;

    // ESTADO GLOBAL DE LA TABLET
    let numCuarto = null;
    let pacienteActualId = null;
    let empleadoLogueado = null;
    let carritoTablet = {};
    let pinActual = "";
    
    // ==========================================
    // 1. INICIALIZACIÓN (LEER DESDE LA URL)
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    numCuarto = urlParams.get('room');

    if(!numCuarto) {
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; background-color: #121212;">
                <h1 style="color: var(--danger-red); font-size: 3em;">❌ Error de Configuración</h1>
                <h2 style="color: gray;">No se especificó el número de cuarto.</h2>
                <p style="font-size: 1.5em; color: white;">Por favor, agrega el parámetro en la URL.<br><br>Ejemplo: <strong>tablet.html?room=101</strong></p>
            </div>`;
        throw new Error("Ejecución detenida: Falta parámetro ?room en la URL.");
    }

    // Si hay cuarto, iniciamos la escucha
    document.getElementById('display-room').innerText = numCuarto;
    document.getElementById('pos-room-header').innerText = numCuarto;
    escucharCuentaCuarto();
    escucharInventario();

    // ==========================================
    // LÓGICA DE LA VISTA PRINCIPAL
    // ==========================================
    function escucharCuentaCuarto() {
        const q = query(collection(db, "accounts"), where("cuarto_id", "==", numCuarto), where("estado", "==", "abierta"));
        onSnapshot(q, (snap) => {
            const idleContent = document.getElementById('idle-content');
            const obsBox = document.getElementById('display-obs-box');
            const obsText = document.getElementById('display-obs-text');
            const nameEl = document.getElementById('display-name');

            if(snap.empty) {
                pacienteActualId = null;
                nameEl.innerText = "Cuarto Disponible";
                nameEl.style.display = "block";
                idleContent.classList.remove('anon-mode');
                obsBox.style.display = "none";
            } else {
                const docSnap = snap.docs[0];
                const data = docSnap.data();
                pacienteActualId = docSnap.id;

                if(data.es_anonimo) {
                    idleContent.classList.add('anon-mode');
                    nameEl.style.display = "none";
                } else {
                    idleContent.classList.remove('anon-mode');
                    nameEl.style.display = "block";
                    nameEl.innerText = data.paciente_nombre;
                }

                if(data.alergias && data.alergias.trim() !== "") {
                    obsBox.style.display = "block";
                    obsText.innerText = data.alergias;
                    obsBox.className = `observations-box obs-${data.nivel_observacion || 'baja'}`;
                } else {
                    obsBox.style.display = "none";
                }
            }
        });
    }

    // ==========================================
    // LÓGICA DEL PIN
    // ==========================================
    function abrirPin() {
        if(!pacienteActualId) { alert("No hay paciente activo en este cuarto."); return; }
        pinActual = "";
        actualizarPinDisplay();
        document.getElementById('pin-overlay').style.display = 'flex';
        document.getElementById('pin-overlay').classList.remove('pin-error');
    }

    function cerrarPin() {
        document.getElementById('pin-overlay').style.display = 'none';
    }

    async function addPin(digit) {
        if(pinActual.length < 4) {
            pinActual += digit;
            actualizarPinDisplay();
            
            if(pinActual.length === 4) {
                await validarPin(pinActual);
            }
        }
    }

    function actualizarPinDisplay() {
        document.getElementById('pin-dots').innerText = "•".repeat(pinActual.length) + " ".repeat(4 - pinActual.length);
    }

    async function validarPin(pinCode) {
        const q = query(collection(db, "employees"), where("pin", "==", pinCode));
        const snap = await getDocs(q);

        if(snap.empty) {
            // PIN INCORRECTO
            const overlay = document.getElementById('pin-overlay');
            overlay.classList.add('pin-error');
            setTimeout(() => {
                overlay.classList.remove('pin-error');
                pinActual = "";
                actualizarPinDisplay();
            }, 500);
        } else {
            // PIN CORRECTO
            const doc = snap.docs[0];
            empleadoLogueado = { id: doc.id, ...doc.data() };
            document.getElementById('pos-employee-name').innerText = empleadoLogueado.nombre;
            
            cerrarPin();
            document.getElementById('idle-view').style.display = 'none';
            document.getElementById('pos-view').style.display = 'flex';
            carritoTablet = {};
            renderCarrito();
        }
    }

    // ==========================================
    // LÓGICA DE INVENTARIO Y POS
    // ==========================================
    function escucharInventario() {
        onSnapshot(collection(db, "inventory_master"), (snap) => {
            const grid = document.getElementById('pos-inventory-grid');
            grid.innerHTML = '';
            snap.forEach((docSnap) => {
                const item = { id: docSnap.id, ...docSnap.data() };
                if(item.publicado_en_pos) {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.onclick = () => agregarItem(item);
                    card.innerHTML = `
                        <div class="item-name">${item.nombre}</div>
                        <div class="item-stock">Stock: ${item.stock}</div>
                    `;
                    grid.appendChild(card);
                }
            });
        });
    }

    function agregarItem(item) {
        if(item.stock <= 0) return;
        if(carritoTablet[item.id]) {
            if(carritoTablet[item.id].cantidad >= item.stock) return;
            carritoTablet[item.id].cantidad++;
        } else {
            carritoTablet[item.id] = { item: item, cantidad: 1 };
        }
        renderCarrito();
    }

    function modificarQty(itemId, delta) {
        if(!carritoTablet[itemId]) return;
        const nuevaQty = carritoTablet[itemId].cantidad + delta;
        if(nuevaQty <= 0) {
            delete carritoTablet[itemId];
        } else if(nuevaQty <= carritoTablet[itemId].item.stock) {
            carritoTablet[itemId].cantidad = nuevaQty;
        }
        renderCarrito();
    }

    function renderCarrito() {
        const list = document.getElementById('pos-cart-list');
        list.innerHTML = '';
        const items = Object.keys(carritoTablet);
        
        if(items.length === 0) {
            list.innerHTML = '<div style="color:gray; text-align:center; margin-top:20px;">Toque un insumo para agregarlo.</div>';
            return;
        }

        items.forEach(id => {
            const row = carritoTablet[id];
            list.innerHTML += `
                <div class="cart-item">
                    <div style="flex:1;">${row.item.nombre}</div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="modificarQty('${id}', -1)">-</button>
                        <span style="width: 30px; text-align:center; font-weight:bold;">${row.cantidad}</span>
                        <button class="btn-qty" onclick="modificarQty('${id}', 1)">+</button>
                    </div>
                </div>
            `;
        });
    }

    async function confirmarInsumos() {
        const items = Object.keys(carritoTablet);
        if(items.length === 0) return;

        const btn = document.getElementById('btn-procesar-tablet');
        btn.innerText = "⏳ Guardando...";
        btn.disabled = true;

        const batch = writeBatch(db);
        const transRef = collection(db, "transactions");
        const accRef = doc(db, "accounts", pacienteActualId);
        let granTotal = 0;

        // IDENTIDAD UNIFICADA: Usamos el ID del documento del empleado (que debe coincidir con su UID de Auth)
        const masterUID = empleadoLogueado.id; 

        for (const id in carritoTablet) {
            const obj = carritoTablet[id];
            const subtotal = obj.cantidad * obj.item.precio_venta;
            granTotal += subtotal;

            batch.set(doc(transRef), {
                pacienteId: pacienteActualId,
                itemId: obj.item.id,
                nombre: obj.item.nombre,
                cantidad: obj.cantidad,
                precio_venta: subtotal,
                usuario_registro: masterUID,
                acreditado_a_id: masterUID,
                acreditado_a_nombre: empleadoLogueado.nombre,
                timestamp: serverTimestamp(),
                tipo_operacion: 'cargo_directo_tablet'
            });
            
            batch.update(doc(db, "inventory_master", obj.item.id), { stock: increment(-obj.cantidad) });
        }
        
        batch.update(accRef, { total: increment(granTotal) });

        try {
            await batch.commit();
            salirPOS();
        } catch (error) {
            console.error(error);
            alert("Error al procesar insumos.");
            btn.innerText = "✅ Confirmar";
            btn.disabled = false;
        }
    }

    function salirPOS() {
        document.getElementById('pos-view').style.display = 'none';
        document.getElementById('idle-view').style.display = 'flex';
        empleadoLogueado = null;
        carritoTablet = {};
        
        const btn = document.getElementById('btn-procesar-tablet');
        btn.innerText = "✅ Confirmar";
        btn.disabled = false;
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error intentando activar pantalla completa: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
</script>
</body>
</html>

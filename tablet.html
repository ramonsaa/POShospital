<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor de Cuarto - Hospital POS</title>
    <style>
        :root { --primary: #2c3e50; --bg: #fdfdfd; --text: #2c3e50; --alert: #c0392b; --accent: #27ae60; }
        body { font-family: sans-serif; margin: 0; background-color: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
        
        .monitor-view { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; }
        .btn-maletin { position: absolute; top: 30px; left: 30px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2em; cursor: pointer; border: none; z-index: 10; }
        .btn-fullscreen { position: absolute; top: 30px; right: 30px; background: rgba(44, 62, 80, 0.05); color: var(--primary); border: 2px solid var(--primary); padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; }
        
        .header-cuarto { text-align: center; font-size: 3em; font-weight: bold; color: var(--primary); border-bottom: 4px solid var(--primary); padding-bottom: 10px;}
        .paciente-nombre { font-size: 4em; font-weight: 900; margin-top: 40px; text-transform: uppercase; text-align: center;}
        
        .alertas-box { margin-top: auto; padding: 20px; border-radius: 8px; border-left: 10px solid; }
        .alertas-title { font-weight: bold; font-size: 1.5em; margin-bottom: 10px; text-transform: uppercase; }
        .alertas-text { font-size: 2em; font-weight: bold; }
        /* Clases de colores dinámicos */
        .alta { background: #fdedec; border-left-color: #c0392b; color: #c0392b; }
        .media { background: #fdf2e9; border-left-color: #d35400; color: #d35400; }
        .baja { background: #ebf5fb; border-left-color: #2980b9; color: #2980b9; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 100; flex-direction: column; }
        .pin-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-display { font-size: 3em; letter-spacing: 15px; margin-bottom: 30px; font-weight: bold; color: var(--primary); }
        .numpad { display: grid; grid-template-columns: repeat(3, 100px); gap: 15px; }
        .num-key { width: 100px; height: 100px; font-size: 2em; border-radius: 50%; border: 2px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; }
        
        .inventory-grid { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .inv-card { background: white; padding: 20px; border: 2px solid #ccc; border-radius: 8px; font-size: 1.5em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="monitor-view">
    <button class="btn-maletin" onclick="abrirPinPad()">💼</button>
    <button id="btn-fullscreen" class="btn-fullscreen" onclick="solicitarFullscreen()">🖵 Pantalla Completa</button>

    <div class="header-cuarto">CUARTO <span id="lbl-cuarto">--</span></div>
    <div id="pantalla-vacia" style="flex:1; display:flex; align-items:center; justify-content:center; font-size:3em; color:#ccc;">Habitación Disponible</div>

    <div id="pantalla-activa" style="display:none; flex:1; flex-direction:column;">
        <div class="paciente-nombre" id="lbl-paciente"></div>
        <div class="alertas-box baja" id="caja-alertas">
            <div class="alertas-title">⚠️ Observaciones</div>
            <div class="alertas-text" id="lbl-alergias"></div>
        </div>
    </div>
</div>

<div id="overlay-pin" class="overlay">
    <div class="pin-container">
        <div class="pin-display" id="pin-display"></div>
        <div class="numpad">
            <button class="num-key" onclick="teclaPin('1')">1</button><button class="num-key" onclick="teclaPin('2')">2</button><button class="num-key" onclick="teclaPin('3')">3</button>
            <button class="num-key" onclick="teclaPin('4')">4</button><button class="num-key" onclick="teclaPin('5')">5</button><button class="num-key" onclick="teclaPin('6')">6</button>
            <button class="num-key" onclick="teclaPin('7')">7</button><button class="num-key" onclick="teclaPin('8')">8</button><button class="num-key" onclick="teclaPin('9')">9</button>
            <button class="num-key" onclick="borrarPin()">X</button><button class="num-key" onclick="teclaPin('0')">0</button><button class="num-key" onclick="validarPin()">✔</button>
        </div>
    </div>
</div>

<div id="overlay-inventario" class="overlay">
    <div style="padding:20px; font-size:2em; font-weight:bold; color:var(--primary);">Selecciona Insumo <button onclick="cerrarOverlays()" style="float:right;">Cerrar</button></div>
    <div class="inventory-grid" id="grid-inventario"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, query, where, onSnapshot, getDocs, doc, writeBatch, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const db = initializeFirestore(initializeApp({
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    }), { localCache: persistentLocalCache() });

    const cuarto = new URLSearchParams(window.location.search).get('cuarto');
    document.getElementById('lbl-cuarto').innerText = cuarto;

    let pacienteActivo = null; let enfermeraActual = null; let pinIngresado = ""; let usuariosPermitidos = [];

    // LÓGICA DE TIEMPO REAL
    onSnapshot(query(collection(db, "accounts"), where("cuarto_id", "==", cuarto), where("estado", "==", "abierta")), (snapshot) => {
        if (snapshot.empty) {
            pacienteActivo = null; 
            document.getElementById('pantalla-vacia').style.display = 'flex';
            document.getElementById('pantalla-activa').style.display = 'none';
        } else {
            const data = snapshot.docs[0].data();
            pacienteActivo = { id: snapshot.docs[0].id, ...data };
            
            // Actualizar nombre con lógica de anonimato
            document.getElementById('lbl-paciente').innerText = data.es_anonimo ? "PACIENTE ANÓNIMO" : (data.paciente_nombre || "SIN NOMBRE");
            
            // Actualizar notas y colores
            document.getElementById('lbl-alergias').innerText = data.alergias || "Ninguna registrada.";
            const caja = document.getElementById('caja-alertas');
            caja.className = 'alertas-box ' + (data.nivel_observacion || 'baja');
            
            document.getElementById('pantalla-vacia').style.display = 'none';
            document.getElementById('pantalla-activa').style.display = 'flex';
        }
    });

    // Cargar Inventario
    onSnapshot(query(collection(db, "inventory_master"), where("publicado_en_pos", "==", true)), (snap) => {
        const grid = document.getElementById('grid-inventario'); grid.innerHTML = '';
        snap.forEach(docSnap => {
            const item = { id: docSnap.id, ...docSnap.data() };
            const card = document.createElement('div'); card.className = 'inv-card';
            card.innerHTML = `<div>${item.nombre}</div><div style="font-size:0.5em;">Stock: ${item.stock}</div>`;
            card.onclick = () => aplicarCargo(item);
            grid.appendChild(card);
        });
    });

    // Validar Usuarios
    (async () => {
        const snap = await getDocs(collection(db, "users"));
        usuariosPermitidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if(usuariosPermitidos.length === 0) usuariosPermitidos.push({ id: "test", nombre: "Enfermera", pin: "1234" });
    })();

    // FUNCIONES GLOBALES
    window.solicitarFullscreen = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); };
    window.abrirPinPad = () => { if(!pacienteActivo) return; pinIngresado = ""; document.getElementById('overlay-pin').style.display = 'flex'; };
    window.teclaPin = (n) => { if(pinIngresado.length < 6) { pinIngresado += n; document.getElementById('pin-display').innerText = "*".repeat(pinIngresado.length); } };
    window.borrarPin = () => { pinIngresado = ""; document.getElementById('pin-display').innerText = ""; };
    
    window.validarPin = () => {
        const user = usuariosPermitidos.find(u => u.pin === pinIngresado);
        if(user) { enfermeraActual = user; document.getElementById('overlay-pin').style.display = 'none'; document.getElementById('overlay-inventario').style.display = 'flex'; }
        else { alert("PIN incorrecto"); borrarPin(); }
    };

    window.cerrarOverlays = () => { document.getElementById('overlay-pin').style.display = 'none'; document.getElementById('overlay-inventario').style.display = 'none'; };

    async function aplicarCargo(item) {
        if(item.stock <= 0) return alert("Sin stock");
        cerrarOverlays();
        const batch = writeBatch(db);
        batch.set(doc(collection(db, "transactions")), { pacienteId: pacienteActivo.id, itemId: item.id, nombre: item.nombre, cantidad: 1, precio_venta: item.precio_venta, usuario_registro: enfermeraActual.id, acreditado_a_nombre: enfermeraActual.nombre, timestamp: serverTimestamp() });
        batch.update(doc(db, "inventory_master", item.id), { stock: increment(-1) });
        batch.update(doc(db, "accounts", pacienteActivo.id), { total: increment(item.precio_venta) });
        await batch.commit();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Cuarto - Hospital</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --secondary-blue: #34495e;
            --accent-green: #27ae60;
            --danger-red: #c0392b;
            --warning-orange: #d35400;
            --safe-blue: #2980b9;
            --text-dark: #1a252f;
            --bg-light-blue: #f4f9fc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg-light-blue); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ==========================================
           1. VISTA PRINCIPAL (IDLE) REESTRUCTURADA
           ========================================== */
        #idle-view {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .idle-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-top-left { 
            position: absolute; 
            left: 20px; 
            font-size: 2.5em; 
            cursor: pointer; 
            background: rgba(255,255,255,0.1); 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
        }

        .btn-top-right { 
            position: absolute; 
            right: 20px; 
            font-size: 1.5em; 
            cursor: pointer; 
            background: rgba(255,255,255,0.1); 
            padding: 10px 15px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
        }
        :fullscreen .btn-top-right { display: none; }

        .room-number { 
            font-size: 7em; 
            font-weight: bold; 
            margin: 0; 
            line-height: 1; 
            letter-spacing: 2px;
        }
        .anon-mode .room-number { font-size: 10em; color: var(--accent-green); }

        .idle-body {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        .patient-name { 
            font-size: 5.5em; 
            font-weight: 600; 
            margin: 0; 
            color: var(--text-dark);
            text-align: left;
        }

        .observations-footer {
            padding: 25px 50px;
            font-size: 2.2em;
            color: white;
            font-weight: bold;
            text-align: left;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }
        .obs-baja { background-color: var(--safe-blue); }
        .obs-media { background-color: var(--warning-orange); }
        .obs-alta { background-color: var(--danger-red); }

        /* ==========================================
           2. MODALES
           ========================================== */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        
        /* Estilos PIN */
        .pin-display { font-size: 4em; letter-spacing: 15px; margin-bottom: 30px; height: 60px; font-weight: bold; color: var(--accent-green);}
        .pin-pad { display: grid; grid-template-columns: repeat(3, 100px); gap: 15px; }
        .pin-btn { 
            width: 100px; height: 100px; font-size: 2.5em; border-radius: 50%; border: 2px solid var(--secondary-blue);
            background: transparent; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .pin-btn:active { background: var(--secondary-blue); }
        .pin-btn-cancel { grid-column: 2; background: var(--danger-red); border-color: var(--danger-red); }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .pin-error { animation: shake 0.4s; background-color: rgba(192, 57, 43, 0.4) !important; }

        /* Estilos Confirmación y Alertas */
        .checkout-modal-content {
            background: white; padding: 40px; border-radius: 15px; text-align: center;
            max-width: 500px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ==========================================
           3. VISTA POS (INSUMOS)
           ========================================== */
        #pos-view {
            display: none; flex: 1; flex-direction: column; background: #eef2f5; color: var(--text-dark);
        }
        .pos-header { background: var(--primary-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.5em; }
        .main-pos { display: flex; flex: 1; overflow: hidden; }
        
        .inventory-list { flex: 2; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; align-content: start; }
        
        .item-card { 
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s;
        }
        .item-card:active { transform: scale(0.95); border-color: var(--accent-green); }
        
        .item-name { font-weight: 800; font-size: 1.3em; margin-bottom: 10px; color: #1a252f; }
        .item-stock { font-size: 1em; color: #34495e; font-weight: 700; } 

        .cart-sidebar { flex: 1; background: white; border-left: 2px solid var(--border-color); display: flex; flex-direction: column; }
        .cart-header { background: var(--secondary-blue); color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold;}
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ccc; font-size: 1.2em; font-weight: 600; color: #1a252f;}
        
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 40px; height: 40px; border: none; background: var(--primary-blue); color: white; font-size: 1.5em; border-radius: 5px; cursor: pointer; font-weight: bold;}
        
        .cart-footer { padding: 20px; background: #f8f9fa; border-top: 1px solid #ccc; }
        .btn-confirm { width: 100%; padding: 20px; font-size: 2em; background: var(--accent-green); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancel-pos { width: 100%; padding: 15px; font-size: 1.2em; background: var(--danger-red); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="idle-view">
        <div class="idle-header">
            <div class="btn-top-left" onclick="abrirPin()">💼</div>
            <h1 class="room-number" id="display-room">--</h1>
            <button class="btn-top-right" onclick="toggleFullscreen()">🖵 Pantalla Completa</button>
        </div>

        <div class="idle-body" id="idle-content">
            <h2 class="patient-name" id="display-name">Esperando paciente...</h2>
        </div>

        <div class="observations-footer obs-baja" id="display-obs-box" style="display: none;">
            <span id="display-obs-text"></span>
        </div>
    </div>

    <div id="pin-overlay" class="modal-overlay">
        <div class="pin-display" id="pin-dots"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="addPin('1')">1</button>
            <button class="pin-btn" onclick="addPin('2')">2</button>
            <button class="pin-btn" onclick="addPin('3')">3</button>
            <button class="pin-btn" onclick="addPin('4')">4</button>
            <button class="pin-btn" onclick="addPin('5')">5</button>
            <button class="pin-btn" onclick="addPin('6')">6</button>
            <button class="pin-btn" onclick="addPin('7')">7</button>
            <button class="pin-btn" onclick="addPin('8')">8</button>
            <button class="pin-btn" onclick="addPin('9')">9</button>
            <button class="pin-btn pin-btn-cancel" onclick="cerrarPin()">X</button>
            <button class="pin-btn" style="grid-column: 3;" onclick="addPin('0')">0</button>
        </div>
    </div>

    <div id="checkout-overlay" class="modal-overlay">
        <div class="checkout-modal-content">
            <h2 style="color: var(--primary-blue); font-size: 2.5em; margin-top: 0; border-bottom: 2px solid #ccc; padding-bottom: 10px;">📝 Confirmar Cargos</h2>
            <p style="font-size: 1.5em; color: var(--text-dark); margin: 20px 0;">
                Se agregarán <strong style="color:var(--primary-blue);"><span id="chk-qty">0</span></strong> insumo(s) a la cuenta de este cuarto.
            </p>
            <p style="font-size: 2em; color: var(--accent-green); font-weight: bold; margin: 20px 0;">
                Total: <span id="chk-total">$0.00</span>
            </p>
            
            <div style="display:flex; gap:15px; margin-top: 30px;">
                <button class="btn-cancel-pos" style="margin-top:0; flex:1; font-size:1.5em;" onclick="cerrarCheckoutModal()">Cancelar</button>
                <button class="btn-confirm" style="flex:1; font-size:1.5em;" id="btn-final-checkout" onclick="ejecutarCheckout()">✅ Proceder</button>
            </div>
        </div>
    </div>

    <div id="custom-alert-overlay" class="modal-overlay" style="z-index: 3000;">
        <div class="checkout-modal-content" style="max-width: 400px; padding: 30px;">
            <div id="custom-alert-icon" style="font-size: 4em; margin-bottom: 10px;">✅</div>
            <p id="custom-alert-msg" style="font-size: 1.5em; color: var(--text-dark); margin-bottom: 25px; font-weight: bold;"></p>
            <button id="btn-custom-alert" class="btn-confirm" style="width: 100%; font-size: 1.5em;">Entendido</button>
        </div>
    </div>

    <div id="pos-view">
        <header class="pos-header">
            <div>Cuarto: <strong id="pos-room-header">--</strong></div>
            <div>Enfermero/a: <strong id="pos-employee-name">--</strong></div>
        </header>
        <div class="main-pos">
            <div class="inventory-list" id="pos-inventory-grid">
                </div>
            <div class="cart-sidebar">
                <div class="cart-header">Lista de Insumos a Cargar</div>
                <div class="cart-items" id="pos-cart-list">
                    </div>
                <div class="cart-footer">
                    <button class="btn-confirm" onclick="abrirCheckoutModal()">✅ Confirmar</button>
                    <button class="btn-cancel-pos" onclick="salirPOS()">Cerrar Sesión (Volver)</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    // 1. IMPORTAMOS AUTH PARA EL LOGIN SILENCIOSO (MODO KIOSCO)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, getDocs, doc, writeBatch, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        authDomain: "hospital1-admin.firebaseapp.com",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // EXPORTAR A VENTANA GLOBAL
    window.toggleFullscreen = toggleFullscreen;
    window.abrirPin = abrirPin;
    window.cerrarPin = cerrarPin;
    window.addPin = addPin;
    window.salirPOS = salirPOS;
    window.agregarItem = agregarItem;
    window.modificarQty = modificarQty;
    window.abrirCheckoutModal = abrirCheckoutModal;
    window.cerrarCheckoutModal = cerrarCheckoutModal;
    window.ejecutarCheckout = ejecutarCheckout;

    let numCuarto = null;
    let pacienteActualId = null;
    let empleadoLogueado = null;
    let carritoTablet = {};
    let pinActual = "";
    
    // ==========================================
    // SISTEMA DE ALERTAS PERSONALIZADO (NO ROMPE FULLSCREEN)
    // ==========================================
    window.customAlert = function(mensaje, tipo = 'success') {
        return new Promise((resolve) => {
            const overlay = document.getElementById('custom-alert-overlay');
            const msgEl = document.getElementById('custom-alert-msg');
            const iconEl = document.getElementById('custom-alert-icon');
            const btn = document.getElementById('btn-custom-alert');

            msgEl.innerText = mensaje;
            
            if (tipo === 'error') {
                iconEl.innerText = '❌';
                btn.style.backgroundColor = 'var(--danger-red)';
            } else {
                iconEl.innerText = '✅';
                btn.style.backgroundColor = 'var(--accent-green)';
            }

            overlay.style.display = 'flex';

            btn.onclick = () => {
                overlay.style.display = 'none';
                resolve();
            };
        });
    };

    // ==========================================
    // INICIALIZACIÓN Y URL
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    numCuarto = urlParams.get('room');

    if(!numCuarto) {
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; background-color: #1a252f;">
                <h1 style="color: var(--danger-red); font-size: 3em;">❌ Error de Configuración</h1>
                <h2 style="color: #ecf0f1;">No se especificó el número de cuarto.</h2>
                <p style="font-size: 1.5em; color: #bdc3c7;">Agrega el parámetro en la URL.<br><br>Ejemplo: <strong>tablet.html?room=101</strong></p>
            </div>`;
        throw new Error("Falta parámetro ?room en la URL.");
    }

    // ==========================================
    // LOGIN SILENCIOSO (MODO KIOSCO)
    // ==========================================
    // NOTA: Asegúrate de crear este usuario en tu panel de administración.
    const CUENTA_TABLET = "tablet@hospital.com"; 
    const PASS_TABLET = "hospital1234";

    signInWithEmailAndPassword(auth, CUENTA_TABLET, PASS_TABLET)
        .then(() => {
            console.log("✅ Tablet autenticada en Firebase (Modo Kiosco)");
            
            document.getElementById('display-room').innerText = numCuarto;
            document.getElementById('pos-room-header').innerText = numCuarto;
            escucharCuentaCuarto();
            escucharInventario();
        })
        .catch((error) => {
            console.error("Error al iniciar sesión de tablet:", error);
            document.body.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; background-color: #1a252f;">
                    <h1 style="color: var(--danger-red); font-size: 3em;">❌ Error de Conexión</h1>
                    <h2 style="color: #ecf0f1;">La cuenta de Kiosco no existe o la contraseña es incorrecta.</h2>
                    <p style="font-size: 1.5em; color: #bdc3c7;">Ve al panel de administrador y crea el empleado:<br><strong>${CUENTA_TABLET}</strong><br>con contraseña <strong>${PASS_TABLET}</strong></p>
                </div>`;
        });

    function escucharCuentaCuarto() {
        const q = query(collection(db, "accounts"), where("cuarto_id", "==", numCuarto), where("estado", "==", "abierta"));
        onSnapshot(q, (snap) => {
            const idleContent = document.getElementById('idle-content');
            const obsBox = document.getElementById('display-obs-box');
            const obsText = document.getElementById('display-obs-text');
            const nameEl = document.getElementById('display-name');

            if(snap.empty) {
                pacienteActualId = null;
                nameEl.innerText = "Cuarto Disponible";
                nameEl.style.display = "block";
                idleContent.classList.remove('anon-mode');
                obsBox.style.display = "none";
            } else {
                const docSnap = snap.docs[0];
                const data = docSnap.data();
                pacienteActualId = docSnap.id;

                if(data.es_anonimo) {
                    idleContent.classList.add('anon-mode');
                    nameEl.style.display = "none";
                } else {
                    idleContent.classList.remove('anon-mode');
                    nameEl.style.display = "block";
                    nameEl.innerText = data.paciente_nombre;
                }

                if(data.alergias && data.alergias.trim() !== "") {
                    obsBox.style.display = "block";
                    obsText.innerText = data.alergias;
                    obsBox.className = `observations-footer obs-${data.nivel_observacion || 'baja'}`;
                } else {
                    obsBox.style.display = "none";
                }
            }
        });
    }

    function abrirPin() {
        if(!pacienteActualId) { 
            customAlert("No hay paciente activo en este cuarto.", "error"); 
            return; 
        }
        pinActual = "";
        actualizarPinDisplay();
        document.getElementById('pin-overlay').style.display = 'flex';
        document.getElementById('pin-overlay').classList.remove('pin-error');
    }

    function cerrarPin() {
        document.getElementById('pin-overlay').style.display = 'none';
    }

    async function addPin(digit) {
        if(pinActual.length < 4) {
            pinActual += digit;
            actualizarPinDisplay();
            if(pinActual.length === 4) await validarPin(pinActual);
        }
    }

    function actualizarPinDisplay() {
        document.getElementById('pin-dots').innerText = "•".repeat(pinActual.length) + " ".repeat(4 - pinActual.length);
    }

    async function validarPin(pinCode) {
        const q = query(collection(db, "employees"), where("pin", "==", pinCode));
        const snap = await getDocs(q);

        if(snap.empty) {
            const overlay = document.getElementById('pin-overlay');
            overlay.classList.add('pin-error');
            setTimeout(() => {
                overlay.classList.remove('pin-error');
                pinActual = "";
                actualizarPinDisplay();
            }, 500);
        } else {
            const doc = snap.docs[0];
            empleadoLogueado = { id: doc.id, ...doc.data() };
            document.getElementById('pos-employee-name').innerText = empleadoLogueado.nombre;
            
            cerrarPin();
            document.getElementById('idle-view').style.display = 'none';
            document.getElementById('pos-view').style.display = 'flex';
            carritoTablet = {};
            renderCarrito();
        }
    }

    function escucharInventario() {
        onSnapshot(collection(db, "inventory_master"), (snap) => {
            const grid = document.getElementById('pos-inventory-grid');
            grid.innerHTML = '';
            snap.forEach((docSnap) => {
                const item = { id: docSnap.id, ...docSnap.data() };
                if(item.publicado_en_pos) {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.onclick = () => agregarItem(item);
                    card.innerHTML = `<div class="item-name">${item.nombre}</div><div class="item-stock">Stock: ${item.stock}</div>`;
                    grid.appendChild(card);
                }
            });
        });
    }

    function agregarItem(item) {
        if(item.stock <= 0) {
            customAlert("No hay stock disponible.", "error");
            return;
        }
        if(carritoTablet[item.id]) {
            if(carritoTablet[item.id].cantidad >= item.stock) {
                customAlert("Stock máximo alcanzado.", "error");
                return;
            }
            carritoTablet[item.id].cantidad++;
        } else {
            carritoTablet[item.id] = { item: item, cantidad: 1 };
        }
        renderCarrito();
    }

    function modificarQty(itemId, delta) {
        if(!carritoTablet[itemId]) return;
        const nuevaQty = carritoTablet[itemId].cantidad + delta;
        if(nuevaQty <= 0) delete carritoTablet[itemId];
        else if(nuevaQty <= carritoTablet[itemId].item.stock) carritoTablet[itemId].cantidad = nuevaQty;
        renderCarrito();
    }

    function renderCarrito() {
        const list = document.getElementById('pos-cart-list');
        list.innerHTML = '';
        const items = Object.keys(carritoTablet);
        
        if(items.length === 0) {
            list.innerHTML = '<div style="color:#7f8c8d; text-align:center; margin-top:20px; font-weight:bold;">Toque un insumo para agregarlo.</div>';
            return;
        }

        items.forEach(id => {
            const row = carritoTablet[id];
            list.innerHTML += `
                <div class="cart-item">
                    <div style="flex:1;">${row.item.nombre}</div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="modificarQty('${id}', -1)">-</button>
                        <span style="width: 30px; text-align:center; font-weight:bold;">${row.cantidad}</span>
                        <button class="btn-qty" onclick="modificarQty('${id}', 1)">+</button>
                    </div>
                </div>`;
        });
    }

    // ==========================================
    // SISTEMA DE CONFIRMACIÓN Y CHECKOUT
    // ==========================================
    
    function abrirCheckoutModal() {
        const ids = Object.keys(carritoTablet);
        if (ids.length === 0) {
            customAlert("El carrito está vacío.", "error");
            return;
        }

        let total = 0;
        let qty = 0;

        for (const id in carritoTablet) {
            total += (carritoTablet[id].cantidad * carritoTablet[id].item.precio_venta);
            qty += carritoTablet[id].cantidad;
        }

        document.getElementById('chk-qty').innerText = qty;
        document.getElementById('chk-total').innerText = `$${total.toLocaleString('es-MX')}`;
        
        document.getElementById('checkout-overlay').style.display = 'flex';
    }

    function cerrarCheckoutModal() {
        document.getElementById('checkout-overlay').style.display = 'none';
    }

    async function ejecutarCheckout() {
        const btn = document.getElementById('btn-final-checkout');
        btn.innerText = "⏳ Procesando...";
        btn.disabled = true;

        const batch = writeBatch(db);
        const transRef = collection(db, "transactions");
        const accRef = doc(db, "accounts", pacienteActualId);
        let granTotal = 0;

        const masterUID = empleadoLogueado.id; 

        for (const id in carritoTablet) {
            const obj = carritoTablet[id];
            const subtotal = obj.cantidad * obj.item.precio_venta;
            granTotal += subtotal;

            batch.set(doc(transRef), {
                pacienteId: pacienteActualId,
                itemId: obj.item.id,
                nombre: obj.item.nombre,
                cantidad: obj.cantidad,
                precio_venta: subtotal,
                usuario_registro: masterUID,
                acreditado_a_id: masterUID,
                acreditado_a_nombre: empleadoLogueado.nombre,
                timestamp: serverTimestamp(),
                tipo_operacion: 'cargo_directo_tablet'
            });
            
            batch.update(doc(db, "inventory_master", obj.item.id), { stock: increment(-obj.cantidad) });
        }
        
        batch.update(accRef, { total: increment(granTotal) });

        try {
            await batch.commit();
            cerrarCheckoutModal();
            // Usamos nuestra nueva alerta in-app, esperamos a que el usuario le de "Entendido" y lo sacamos a la principal
            await customAlert("Insumos agregados exitosamente a la cuenta.", "success");
            salirPOS();
        } catch (error) {
            console.error(error);
            cerrarCheckoutModal();
            await customAlert("Error al procesar insumos.", "error");
        } finally {
            btn.innerText = "✅ Proceder";
            btn.disabled = false;
        }
    }

    function salirPOS() {
        document.getElementById('pos-view').style.display = 'none';
        document.getElementById('idle-view').style.display = 'flex';
        empleadoLogueado = null;
        carritoTablet = {};
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error al activar pantalla completa: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
</script>
</body>
</html>

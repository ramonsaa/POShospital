<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cuarto</title>
    <style>
        .alertas-box { padding: 20px; border-radius: 8px; border-left: 10px solid; }
        .alta { background: #fdedec; border-left-color: #c0392b; color: #c0392b; }
        .media { background: #fdf2e9; border-left-color: #d35400; color: #d35400; }
        .baja { background: #ebf5fb; border-left-color: #2980b9; color: #2980b9; }
    </style>
</head>
<body>
    <div id="pantalla-activa" style="display:none;">
        <h1 id="lbl-paciente"></h1>
        <div id="caja-alertas" class="alertas-box baja">
            <p id="lbl-alergias"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { initializeFirestore, persistentLocalCache, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const db = initializeFirestore(initializeApp({/* CONFIGS */}), { localCache: persistentLocalCache() });
        const cuarto = new URLSearchParams(window.location.search).get('cuarto');

        onSnapshot(query(collection(db, "accounts"), where("cuarto_id", "==", cuarto), where("estado", "==", "abierta")), (snapshot) => {
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                
                // Actualización Nombre
                document.getElementById('lbl-paciente').innerText = data.es_anonimo ? "PACIENTE ANÓNIMO" : (data.paciente_nombre || "SIN NOMBRE");
                
                // Actualización Observaciones
                document.getElementById('lbl-alergias').innerText = data.alergias || "Sin observaciones.";
                
                // Actualización Colores (Limpieza total de clases y reinyección)
                const caja = document.getElementById('caja-alertas');
                caja.className = 'alertas-box ' + (data.nivel_observacion || 'baja');
                
                document.getElementById('pantalla-activa').style.display = 'block';
            }
        });
    </script>
</body>
</html>

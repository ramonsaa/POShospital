<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hospital POS - Gestión de Empleados</title>
    <style>
        :root { --primary-blue: #2c3e50; --accent-green: #27ae60; --bg: #f4f7f6; --danger: #c0392b; --border: #dcdde1; --warning: #f39c12;}
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--primary-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--accent-green); }
        .user-info { font-size: 0.9em; color: #aed6f1; font-weight: bold;}
        
        main { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        
        /* Panel Izquierdo: Formulario */
        .form-panel { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 20px; width: 350px; display: flex; flex-direction: column; overflow-y: auto;}
        .form-header { font-size: 1.1em; font-weight: bold; color: var(--primary-blue); margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 5px; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85em; font-weight: bold; color: var(--primary-blue); margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent-green); }

        /* Matriz de Permisos */
        .permissions-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 4px; padding: 10px; margin-bottom: 15px; }
        .permissions-box h4 { margin: 0 0 10px 0; font-size: 0.9em; color: var(--primary-blue); }
        .perm-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.85em; }
        .perm-row input[type="checkbox"] { cursor: pointer; }
        
        .perm-master { padding: 8px; background: #eef2f5; border-radius: 4px; border: 1px solid #cbd4db; margin-bottom: 10px; font-weight: bold;}

        button { width: 100%; padding: 10px; border: none; font-weight: bold; border-radius: 3px; cursor: pointer; color: white; transition: 0.2s;}
        .btn-green { background: var(--accent-green); }
        .btn-green:hover { opacity: 0.9; }
        .btn-red { background: var(--danger); padding: 5px 10px; font-size: 0.8em;}
        .btn-red:hover { opacity: 0.9; }
        .btn-edit { background: #2980b9; padding: 5px 10px; font-size: 0.8em; margin-right: 5px;}

        /* Panel Derecho: Lista */
        .list-panel { background: white; border: 1px solid var(--border); border-radius: 4px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #eee; position: sticky; top: 0; text-align: left; padding: 10px; border-bottom: 2px solid #ccc; z-index: 1;}
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top;}
        tr:hover { background: #f0f7ff; }

        .badge-admin { background: #fdf2e9; color: #e67e22; padding: 2px 5px; border-radius: 3px; font-size: 0.8em; font-weight: bold; display: inline-block; margin-bottom: 3px;}
        .badge-perm { background: #eef2f5; color: #34495e; padding: 2px 5px; border-radius: 3px; font-size: 0.75em; border: 1px solid #dcdde1; display: inline-block; margin: 2px; }
        
        .pin-box { font-family: monospace; font-size: 1.2em; font-weight: bold; letter-spacing: 2px; color: var(--primary-blue); background: #f4f7f6; padding: 2px 6px; border-radius: 3px;}

        /* MODALES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 5px; padding: 20px; width: 350px; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    </style>
</head>
<body>

<header>
    <div><strong>HOSPITAL POS</strong> | Gestión de Personal y Permisos</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span id="user-display" class="user-info">Verificando sesión...</span>
        <a href="index.html" style="color: white; text-decoration: none; border: 1px solid white; padding: 5px 10px; border-radius: 4px; font-size: 0.85em;">← Volver a Recepción</a>
    </div>
</header>

<main>
    <div class="form-panel">
        <div class="form-header">➕ Registrar / Editar Empleado</div>
        
        <input type="hidden" id="emp-id"> <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="emp-nombre" placeholder="Ej. Dr. Juan Pérez" required>
        </div>
        
        <div class="input-group">
            <label>Puesto / Rol (Referencia)</label>
            <select id="emp-rol">
                <option value="enfermeria">Enfermería</option>
                <option value="medico">Médico(a)</option>
                <option value="recepcion">Recepción / Caja</option>
                <option value="administracion">Administración</option>
                <option value="sistema">Kiosco / Sistema</option>
            </select>
        </div>

        <div class="input-group">
            <label>PIN de Acceso (4 dígitos)</label>
            <input type="text" id="emp-pin" placeholder="Ej. 1234" maxlength="4" required style="font-family: monospace; font-size: 1.1em; letter-spacing: 2px;">
            <small style="color: gray; font-size: 0.75em;">Usado en Tablets y POS</small>
        </div>
        
        <div class="permissions-box">
            <h4>Niveles de Acceso</h4>
            
            <div class="perm-master">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="perm-admin_global" onchange="toggleAdminGlobal()"> 
                    <span style="color: var(--warning);"> Administrador Global</span>
                </label>
            </div>

            <div id="granular-permissions">
                <div class="perm-row">
                    <input type="checkbox" id="perm-modificar_inventario" class="perm-check">
                    <label for="perm-modificar_inventario">Modificar Inventario / Stock</label>
                </div>
                <div class="perm-row">
                    <input type="checkbox" id="perm-registrar_pacientes" class="perm-check">
                    <label for="perm-registrar_pacientes">Registrar / Editar Pacientes</label>
                </div>
                <div class="perm-row">
                    <input type="checkbox" id="perm-borrar_pacientes" class="perm-check">
                    <label for="perm-borrar_pacientes">Borrar Pacientes</label>
                </div>
                <div class="perm-row">
                    <input type="checkbox" id="perm-cerrar_cuentas" class="perm-check">
                    <label for="perm-cerrar_cuentas">Liquidar / Cerrar Cuentas</label>
                </div>
                <div class="perm-row">
                    <input type="checkbox" id="perm-borrar_cargos" class="perm-check">
                    <label for="perm-borrar_cargos">Borrar Insumos cobrados a una cuenta</label>
                </div>
            </div>
        </div>

        <div id="auth-section" style="padding: 10px; border: 1px dashed var(--warning); border-radius: 4px; margin-bottom: 15px; background: #fffcf5;">
            <p style="margin: 0 0 10px 0; font-size: 0.8em; font-weight: bold; color: var(--warning);">Credenciales de App Móvil</p>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="emp-email" placeholder="ejemplo@hospital.com">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>Contraseña</label>
                <input type="text" id="emp-pass" placeholder="Mínimo 6 caracteres">
            </div>
        </div>

        <button class="btn-green" id="btn-save-emp" onclick="guardarEmpleado()">💾 Guardar Empleado</button>
        <button class="btn-edit" id="btn-cancel-edit" style="display: none; background: gray; width: 100%; margin-top: 10px;" onclick="cancelarEdicion()">Cancelar Edición</button>
    </div>

    <div class="list-panel">
        <div class="panel-header">Directorio de Personal Activo</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre y Puesto</th>
                        <th>PIN</th>
                        <th>Permisos Asignados</th>
                        <th style="width: 130px;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-empleados">
                    <tr><td colspan="4" style="text-align: center; color: gray;">Cargando personal...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        authDomain: "hospital1-admin.firebaseapp.com",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Variables Globales
    let empleadosData = [];
    let isEditing = false;
    let authCache = null; // Para poder crear usuarios sin perder la sesión del admin

    // Exportar funciones
    window.toggleAdminGlobal = toggleAdminGlobal;
    window.guardarEmpleado = guardarEmpleado;
    window.prepararEdicion = prepararEdicion;
    window.cancelarEdicion = cancelarEdicion;
    window.borrarEmpleado = borrarEmpleado;

    // Validación de sesión
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-display').innerText = user.email;
        } else {
            window.location.href = "login.html";
        }
    });

    // Lógica visual del Checkbox Master
    function toggleAdminGlobal() {
        const isAdmin = document.getElementById('perm-admin_global').checked;
        const checkboxes = document.querySelectorAll('.perm-check');
        
        checkboxes.forEach(chk => {
            chk.checked = isAdmin;
            chk.disabled = isAdmin; // Si es admin, no dejamos desmarcar los otros
        });
    }

    // Escuchar Empleados
    onSnapshot(collection(db, "employees"), (snap) => {
        const tbody = document.getElementById('tabla-empleados');
        tbody.innerHTML = '';
        empleadosData = [];

        if (snap.empty) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No hay personal registrado.</td></tr>';
            return;
        }

        snap.forEach(docSnap => {
            const emp = { id: docSnap.id, ...docSnap.data() };
            empleadosData.push(emp);
            
            let badgesHTML = '';
            
            if (emp.es_admin) {
                badgesHTML = `<span class="badge-admin">⭐ Admin Global</span>`;
            } else {
                // Dibujar badges granulares
                if(emp.permisos?.modificar_inventario) badgesHTML += `<span class="badge-perm">Inventario</span>`;
                if(emp.permisos?.registrar_pacientes) badgesHTML += `<span class="badge-perm">Alta Pacientes</span>`;
                if(emp.permisos?.borrar_pacientes) badgesHTML += `<span class="badge-perm">Borrar Pacientes</span>`;
                if(emp.permisos?.cerrar_cuentas) badgesHTML += `<span class="badge-perm">Cerrar Cuentas</span>`;
                if(emp.permisos?.borrar_cargos) badgesHTML += `<span class="badge-perm">Borrar Cargos</span>`;
                
                if(badgesHTML === '') badgesHTML = '<span style="color:gray; font-size:0.8em;">Solo Lectura / Móvil</span>';
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong>${emp.nombre}</strong><br>
                    <small style="color:gray;">${emp.rol.toUpperCase()}</small>
                </td>
                <td><span class="pin-box">${emp.pin}</span></td>
                <td>${badgesHTML}</td>
                <td>
                    <button class="btn-edit" onclick="prepararEdicion('${emp.id}')">✏️</button>
                    <button class="btn-red" onclick="borrarEmpleado('${emp.id}', '${emp.nombre}')">🗑️</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });

    function recopilarPermisos() {
        return {
            modificar_inventario: document.getElementById('perm-modificar_inventario').checked,
            registrar_pacientes: document.getElementById('perm-registrar_pacientes').checked,
            borrar_pacientes: document.getElementById('perm-borrar_pacientes').checked,
            cerrar_cuentas: document.getElementById('perm-cerrar_cuentas').checked,
            borrar_cargos: document.getElementById('perm-borrar_cargos').checked
        };
    }

    async function guardarEmpleado() {
        const nombre = document.getElementById('emp-nombre').value.trim();
        const rol = document.getElementById('emp-rol').value;
        const pin = document.getElementById('emp-pin').value.trim();
        const isAdmin = document.getElementById('perm-admin_global').checked;
        
        if(!nombre || pin.length < 4) return alert("Falta nombre o el PIN debe ser de 4 dígitos.");

        const btn = document.getElementById('btn-save-emp');
        btn.disabled = true;
        btn.innerText = "⏳ Guardando...";

        const idEdicion = document.getElementById('emp-id').value;

        try {
            if (isEditing && idEdicion) {
                // MODO EDICIÓN (Solo Firestore, no Auth)
                await updateDoc(doc(db, "employees", idEdicion), {
                    nombre: nombre,
                    rol: rol,
                    pin: pin,
                    es_admin: isAdmin,
                    permisos: isAdmin ? {} : recopilarPermisos()
                });
                alert("✅ Empleado actualizado.");
                cancelarEdicion();

            } else {
                // MODO CREACIÓN (Auth + Firestore)
                const email = document.getElementById('emp-email').value.trim();
                const pass = document.getElementById('emp-pass').value;

                if(!email || pass.length < 6) {
                    alert("Para cuentas nuevas se requiere Correo y Contraseña (mínimo 6 caracteres).");
                    btn.disabled = false;
                    btn.innerText = "💾 Guardar Empleado";
                    return;
                }

                // Truco de App Secundaria para crear usuario sin cerrar sesión al Admin actual
                if(!authCache) {
                    authCache = initializeApp(firebaseConfig, "SecondaryApp");
                }
                const secondaryAuth = getAuth(authCache);
                
                const userCredential = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                const nuevoUid = userCredential.user.uid;

                // Cerrar sesión en la app secundaria inmediatamente
                await secondaryAuth.signOut();

                // Guardar en Firestore con el UID correcto
                await setDoc(doc(db, "employees", nuevoUid), {
                    nombre: nombre,
                    rol: rol,
                    pin: pin,
                    es_admin: isAdmin,
                    permisos: isAdmin ? {} : recopilarPermisos()
                });

                alert("✅ Nuevo empleado registrado con éxito.");
                cancelarEdicion(); // Sirve para limpiar el form
            }

        } catch (error) {
            console.error(error);
            alert("❌ Error al guardar: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = isEditing ? "💾 Guardar Cambios" : "💾 Guardar Empleado";
        }
    }

    function prepararEdicion(id) {
        const emp = empleadosData.find(e => e.id === id);
        if(!emp) return;

        isEditing = true;
        document.getElementById('emp-id').value = emp.id;
        document.getElementById('emp-nombre').value = emp.nombre;
        document.getElementById('emp-rol').value = emp.rol;
        document.getElementById('emp-pin').value = emp.pin;
        
        // Bloquear sección de Auth porque Firebase no deja editar email/pass fácilmente desde cliente
        document.getElementById('auth-section').style.display = 'none';
        
        // Restaurar checks
        document.getElementById('perm-admin_global').checked = !!emp.es_admin;
        
        const p = emp.permisos || {};
        document.getElementById('perm-modificar_inventario').checked = !!p.modificar_inventario;
        document.getElementById('perm-registrar_pacientes').checked = !!p.registrar_pacientes;
        document.getElementById('perm-borrar_pacientes').checked = !!p.borrar_pacientes;
        document.getElementById('perm-cerrar_cuentas').checked = !!p.cerrar_cuentas;
        document.getElementById('perm-borrar_cargos').checked = !!p.borrar_cargos;

        toggleAdminGlobal(); // Dispara la lógica visual

        document.getElementById('btn-save-emp').innerText = "💾 Guardar Cambios";
        document.getElementById('btn-save-emp').style.background = "#2980b9";
        document.getElementById('btn-cancel-edit').style.display = "block";
    }

    function cancelarEdicion() {
        isEditing = false;
        document.getElementById('emp-id').value = '';
        document.getElementById('emp-nombre').value = '';
        document.getElementById('emp-rol').value = 'enfermeria';
        document.getElementById('emp-pin').value = '';
        document.getElementById('emp-email').value = '';
        document.getElementById('emp-pass').value = '';
        
        document.getElementById('auth-section').style.display = 'block';
        
        document.getElementById('perm-admin_global').checked = false;
        document.querySelectorAll('.perm-check').forEach(chk => {
            chk.checked = false;
            chk.disabled = false;
        });

        document.getElementById('btn-save-emp').innerText = "💾 Guardar Empleado";
        document.getElementById('btn-save-emp').style.background = "var(--accent-green)";
        document.getElementById('btn-cancel-edit').style.display = "none";
    }

    async function borrarEmpleado(id, nombre) {
        if(confirm(`⚠️ ¿Estás completamente seguro de borrar a "${nombre}"?\n\nSu historial en los registros permanecerá, pero ya no podrá acceder al sistema.`)) {
            try {
                await deleteDoc(doc(db, "employees", id));
                // Nota: Eliminar un usuario de Firestore no lo borra automáticamente de Firebase Authentication 
                // (por seguridad de Firebase). Si deseas que no puedan loguearse, esto los bloqueará porque 
                // el POS siempre busca si el UID existe en Firestore al iniciar sesión.
            } catch (error) {
                console.error(error);
                alert("Error al intentar borrar.");
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital POS - Recepción Principal</title>
    <style>
        :root { --primary-blue: #2c3e50; --secondary-blue: #34495e; --accent-green: #27ae60; --light-bg: #f4f7f6; --white: #ffffff; --border-color: #dcdde1; --text-dark: #2f3640; --danger-red: #c0392b; --cart-width: 0px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--light-bg); color: var(--text-dark); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: var(--primary-blue); color: var(--white); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent-green); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .user-info { font-size: 0.9em; color: #aed6f1; font-weight: bold;}
        button.btn-header { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        main { display: grid; grid-template-columns: var(--cart-width) 280px 1fr 380px; gap: 1px; background-color: var(--border-color); flex: 1; transition: grid-template-columns 0.3s ease-in-out; }
        section { background-color: var(--white); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background-color: var(--secondary-blue); color: var(--white); padding: 8px 12px; font-size: 0.85em; font-weight: bold; text-transform: uppercase; }
        .search-container { padding: 10px; background: #fdfdfd; border-bottom: 1px solid var(--border-color); }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 3px; }
        .data-list { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        td { padding: 6px 8px; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
        tr:hover { background-color: #ebf5fb; }
        .selected-row { background-color: #d4e6f1 !important; border-left: 4px solid var(--accent-green); }
        .cart-item { background: #1a252f; color: white; padding: 10px; margin-bottom: 5px; border-left: 3px solid var(--accent-green); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; width: 450px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-modal { padding: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; color: white; }
    </style>
</head>
<body>

<header>
    <div><strong>HOSPITAL POS</strong> | Recepción</div>
    <div class="header-actions">
        <a href="inventory-admin.html" style="color:white; font-size:0.8em; text-decoration:none; border:1px solid white; padding:5px; border-radius:4px;">📦 Inventario</a>
        <span id="user-display" class="user-info">Cargando...</span>
        <button id="btn-fullscreen" class="btn-header">🖵 Pantalla Completa</button>
        <button id="btn-logout" class="btn-header" style="background:#c0392b;">Salir</button>
    </div>
</header>

<main>
    <section id="cart-section">
        <div class="panel-header">🛒 Pre-Checkout</div>
        <div class="data-list" id="cart-list"></div>
        <div style="padding:15px; border-top:1px solid #ddd;">
            <div id="cart-total-text" style="font-size:1.5em; font-weight:bold; color:var(--accent-green); text-align:right;">$0.00</div>
            <button class="btn-modal" style="width:100%; background:var(--accent-green);" id="btn-procesar-carrito">Confirmar Cargos</button>
        </div>
    </section>

    <section>
        <div class="panel-header">Pacientes</div>
        <div class="search-container"><input type="text" id="search-patients" placeholder="Buscar paciente..."></div>
        <div class="data-list"><table><tbody id="lista-pacientes"></tbody></table></div>
    </section>

    <section>
        <div class="panel-header" id="header-cuenta">Cuenta del Paciente</div>
        <div id="resumen-cuenta" style="padding:15px; border-bottom:1px solid #ddd;">Seleccione paciente.</div>
        <div class="data-list"><table><tbody id="lista-transacciones"></tbody></table></div>
        <div class="action-bar" style="padding:10px; border-top:1px solid #ddd;">
            <button class="btn-modal" style="width:100%; background:var(--primary-blue);" id="btn-liquidar">Liquidar Cuenta</button>
        </div>
    </section>

    <section>
        <div class="panel-header">Catálogo</div>
        <div class="search-container">
            <select id="select-empleado"><option value="sistema">Sistema</option></select>
            <input type="text" id="inventory-search" placeholder="Buscar insumo...">
        </div>
        <div class="data-list">
            <table><tbody id="lista-servicios"></tbody></table>
            <table><tbody id="lista-inventario"></tbody></table>
        </div>
    </section>
</main>

<div id="edit-patient-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>✏️ Editar Paciente</h3>
        <input type="text" id="edit-nombre" placeholder="Nombre">
        <input type="text" id="edit-cuarto" placeholder="Cuarto">
        <label><input type="checkbox" id="edit-anonimo"> Modo Anónimo (Ocultar en tablet)</label>
        <select id="edit-nivel"><option value="baja">🔵 Azul (General)</option><option value="media">🟠 Naranja (Precaución)</option><option value="alta">🔴 Rojo (Urgente)</option></select>
        <textarea id="edit-alergias" rows="3" placeholder="Observaciones / Alergias"></textarea>
        <button class="btn-modal" style="background:var(--accent-green);" id="btn-guardar-edicion" onclick="guardarEdicionPaciente()">💾 Guardar</button>
        <button class="btn-modal" style="background:var(--danger-red);" onclick="cerrarModalEdicion()">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, query, where, onSnapshot, doc, updateDoc, increment, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });
    const auth = getAuth(app);

    window.AppState = { pacienteActualId: null, pacienteActualData: null, uid: null, carrito: {} };

    onAuthStateChanged(auth, (user) => {
        if(user) { AppState.uid = user.uid; iniciarSistema(); } else { window.location.href = "login.html"; }
    });

    function iniciarSistema() {
        onSnapshot(query(collection(db, "accounts"), where("estado", "==", "abierta")), (snap) => {
            const tbody = document.getElementById('lista-pacientes'); tbody.innerHTML = '';
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${data.cuarto_id}</td><td>${data.paciente_nombre}${data.es_anonimo?'🕵️':''}</td>`;
                tr.onclick = () => { AppState.pacienteActualId = docSnap.id; AppState.pacienteActualData = data; actualizarPanelDerechoUI(data); };
                tbody.appendChild(tr);
            });
        });
        // Escuchar servicios
        onSnapshot(collection(db, "services_and_kits"), (snap) => {
            const tbody = document.getElementById('lista-servicios'); tbody.innerHTML = '';
            snap.forEach(d => { const it = {id: d.id, ...d.data()}; const tr = document.createElement('tr'); tr.innerHTML = `<td>${it.nombre}</td><td>$${it.precio_venta}</td>`; tr.onclick = () => procesarServicioOKit(it); tbody.appendChild(tr); });
        });
        // Escuchar inventario
        onSnapshot(collection(db, "inventory_master"), (snap) => {
            const tbody = document.getElementById('lista-inventario'); tbody.innerHTML = '';
            snap.forEach(d => { const it = {id: d.id, ...d.data()}; if(it.publicado_en_pos) { const tr = document.createElement('tr'); tr.innerHTML = `<td>${it.nombre}</td><td>$${it.precio_venta}</td>`; tr.onclick = () => agregarAlCarrito(it); tbody.appendChild(tr); } });
        });
    }

    function actualizarPanelDerechoUI(data) {
        document.getElementById('resumen-cuenta').innerHTML = `
            <div>Paciente: <strong>${data.paciente_nombre}</strong></div>
            <button onclick="abrirModalEdicion()">✏️ Editar</button>
            <div style="color:red; margin-top:5px;">Obs: ${data.alergias || 'Ninguna'}</div>
        `;
    }

    window.abrirModalEdicion = () => {
        const p = AppState.pacienteActualData;
        document.getElementById('edit-nombre').value = p.paciente_nombre;
        document.getElementById('edit-cuarto').value = p.cuarto_id;
        document.getElementById('edit-anonimo').checked = !!p.es_anonimo;
        document.getElementById('edit-nivel').value = p.nivel_observacion || 'baja';
        document.getElementById('edit-alergias').value = p.alergias || '';
        document.getElementById('edit-patient-modal').style.display = 'flex';
    };

    window.cerrarModalEdicion = () => document.getElementById('edit-patient-modal').style.display = 'none';

    window.guardarEdicionPaciente = async () => {
        const btn = document.getElementById('btn-guardar-edicion');
        btn.disabled = true; btn.innerText = "Guardando...";
        try {
            const updates = {
                paciente_nombre: document.getElementById('edit-nombre').value,
                cuarto_id: document.getElementById('edit-cuarto').value,
                es_anonimo: document.getElementById('edit-anonimo').checked,
                nivel_observacion: document.getElementById('edit-nivel').value,
                alergias: document.getElementById('edit-alergias').value
            };
            await updateDoc(doc(db, "accounts", AppState.pacienteActualId), updates);
            AppState.pacienteActualData = { ...AppState.pacienteActualData, ...updates };
            actualizarPanelDerechoUI(AppState.pacienteActualData);
            document.getElementById('edit-patient-modal').style.display = 'none';
        } catch(e) { alert("Error al guardar."); } finally { btn.disabled = false; btn.innerText = "💾 Guardar"; }
    };

    function agregarAlCarrito(it) { /* Lógica de carrito */ }
    function procesarServicioOKit(it) { /* Lógica de cobro */ }
    function renderizarCarrito() { /* Lógica visual */ }
    document.getElementById('btn-procesar-carrito').onclick = async () => { /* Batch de cobro */ };
</script>
</body>
</html>

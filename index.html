<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital POS - Recepción</title>
    <style>
        :root { --primary-blue: #2c3e50; --secondary-blue: #34495e; --accent-green: #27ae60; --light-bg: #f4f7f6; --white: #ffffff; --border-color: #dcdde1; --text-dark: #2f3640; --danger-red: #c0392b; --cart-width: 0px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background-color: var(--primary-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent-green); }
        main { display: grid; grid-template-columns: var(--cart-width) 280px 1fr 380px; gap: 1px; background-color: var(--border-color); flex: 1; transition: grid-template-columns 0.3s ease; }
        section { background-color: white; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background-color: var(--secondary-blue); color: white; padding: 8px 12px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .data-list { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        td { padding: 8px; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
        tr:hover { background-color: #ebf5fb; }
        .selected-row { background-color: #d4e6f1 !important; border-left: 4px solid var(--accent-green); }
        .cart-item { background: #1a252f; color: white; padding: 10px; margin-bottom: 5px; border-left: 3px solid var(--accent-green); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; width: 400px; border-radius: 5px; display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 10px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div><strong>HOSPITAL POS</strong> | Recepción</div>
    <div>
        <a href="inventory-admin.html" style="color:white; margin-right:15px;">📦 Inventario</a>
        <button id="btn-fullscreen">🖵 Pantalla Completa</button>
        <button id="btn-logout" style="background:#c0392b; color:white;">Salir</button>
    </div>
</header>

<main>
    <section id="cart-section">
        <div class="panel-header">🛒 Pre-Checkout</div>
        <div class="data-list" id="cart-list"></div>
        <div style="padding:10px;"><div id="cart-total-text" style="font-size:1.5em; text-align:right;">$0.00</div><button class="btn-action" style="width:100%; background:var(--accent-green);" id="btn-procesar-carrito">Confirmar</button></div>
    </section>

    <section>
        <div class="panel-header">Pacientes</div>
        <input type="text" id="search-patients" placeholder="Buscar...">
        <div class="data-list"><table><tbody id="lista-pacientes"></tbody></table></div>
    </section>

    <section>
        <div class="panel-header" id="header-cuenta">Cuenta</div>
        <div id="resumen-cuenta" style="padding:15px;">Seleccione paciente.</div>
        <div class="data-list"><table><tbody id="lista-transacciones"></tbody></table></div>
        <div style="padding:10px;"><button class="btn-action" style="width:100%; background:var(--danger-red);" id="btn-liquidar">Liquidar</button></div>
    </section>

    <section>
        <div class="panel-header">Catálogo</div>
        <select id="select-empleado"><option value="sistema">Sistema</option></select>
        <input type="text" id="inventory-search" placeholder="Buscar...">
        <div class="data-list">
            <table><tbody id="lista-servicios"></tbody></table>
            <table><tbody id="lista-inventario"></tbody></table>
        </div>
    </section>
</main>

<div id="edit-patient-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>✏️ Editar Paciente</h3>
        <input type="text" id="edit-nombre" placeholder="Nombre">
        <input type="text" id="edit-cuarto" placeholder="Cuarto">
        <label><input type="checkbox" id="edit-anonimo"> Modo Anónimo</label>
        <select id="edit-nivel"><option value="baja">🔵 Azul</option><option value="media">🟠 Naranja</option><option value="alta">🔴 Rojo</option></select>
        <textarea id="edit-alergias" rows="3" placeholder="Observaciones"></textarea>
        <button id="btn-guardar-edicion" onclick="guardarEdicionPaciente()">💾 Guardar</button>
        <button onclick="cerrarModalEdicion()">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, query, where, onSnapshot, doc, updateDoc, increment, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });
    const auth = getAuth(app);

    window.AppState = { pacienteActualId: null, pacienteActualData: null, carrito: {} };

    onAuthStateChanged(auth, (user) => { if(user) iniciarSistema(); else window.location.href = "login.html"; });

    function iniciarSistema() {
        // Pacientes
        onSnapshot(query(collection(db, "accounts"), where("estado", "==", "abierta")), (snap) => {
            const tbody = document.getElementById('lista-pacientes'); tbody.innerHTML = '';
            snap.forEach(d => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d.data().cuarto_id}</td><td>${d.data().paciente_nombre}</td>`;
                tr.onclick = () => { AppState.pacienteActualId = d.id; AppState.pacienteActualData = d.data(); actualizarPanelDerechoUI(d.data()); };
                tbody.appendChild(tr);
            });
        });
        // Servicios
        onSnapshot(collection(db, "services_and_kits"), (snap) => {
            const tbody = document.getElementById('lista-servicios'); tbody.innerHTML = '';
            snap.forEach(d => { const it = {id: d.id, ...d.data()}; const tr = document.createElement('tr'); tr.innerHTML = `<td>${it.nombre}</td><td>$${it.precio_venta}</td>`; tr.onclick = () => procesarCargo(it, 'servicio'); tbody.appendChild(tr); });
        });
        // Inventario
        onSnapshot(query(collection(db, "inventory_master"), where("publicado_en_pos", "==", true)), (snap) => {
            const tbody = document.getElementById('lista-inventario'); tbody.innerHTML = '';
            snap.forEach(d => { const it = {id: d.id, ...d.data()}; const tr = document.createElement('tr'); tr.innerHTML = `<td>${it.nombre}</td><td>$${it.precio_venta}</td>`; tr.onclick = () => agregarAlCarrito(it); tbody.appendChild(tr); });
        });
    }

    function actualizarPanelDerechoUI(data) {
        document.getElementById('resumen-cuenta').innerHTML = `
            <div>Paciente: <strong>${data.paciente_nombre}</strong></div>
            <button onclick="abrirModalEdicion()">✏️ Editar</button>
            <div style="color:red;">Obs: ${data.alergias || 'Ninguna'}</div>
        `;
    }

    window.guardarEdicionPaciente = async () => {
        const btn = document.getElementById('btn-guardar-edicion');
        btn.disabled = true; btn.innerText = "Guardando...";
        try {
            const updates = {
                paciente_nombre: document.getElementById('edit-nombre').value,
                cuarto_id: document.getElementById('edit-cuarto').value,
                es_anonimo: document.getElementById('edit-anonimo').checked,
                nivel_observacion: document.getElementById('edit-nivel').value,
                alergias: document.getElementById('edit-alergias').value
            };
            await updateDoc(doc(db, "accounts", AppState.pacienteActualId), updates);
            AppState.pacienteActualData = { ...AppState.pacienteActualData, ...updates };
            actualizarPanelDerechoUI(AppState.pacienteActualData);
            document.getElementById('edit-patient-modal').style.display = 'none';
        } catch(e) { alert("Error"); } finally { btn.disabled = false; btn.innerText = "💾 Guardar"; }
    };
    
    // Abrir Modal
    window.abrirModalEdicion = () => {
        const p = AppState.pacienteActualData;
        document.getElementById('edit-nombre').value = p.paciente_nombre || '';
        document.getElementById('edit-cuarto').value = p.cuarto_id || '';
        document.getElementById('edit-anonimo').checked = !!p.es_anonimo;
        document.getElementById('edit-nivel').value = p.nivel_observacion || 'baja';
        document.getElementById('edit-alergias').value = p.alergias || '';
        document.getElementById('edit-patient-modal').style.display = 'flex';
    };
    window.cerrarModalEdicion = () => document.getElementById('edit-patient-modal').style.display = 'none';
    
    // Lógica adicional (carrito, full-screen, logout) aquí...
    document.getElementById('btn-fullscreen').onclick = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital POS - Iniciar Sesión</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
            --border: #dcdde1;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid var(--border);
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-sizing: border-box;
        }

        .login-card h1 { 
            color: var(--primary); 
            margin: 0 0 5px 0; 
            font-size: 1.8em;
        }

        .login-card p { 
            color: gray; 
            margin-bottom: 30px; 
            font-size: 0.9em; 
        }

        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }

        .input-group label { 
            display: block; 
            font-size: 0.85em; 
            font-weight: bold; 
            color: var(--secondary); 
            margin-bottom: 8px; 
        }

        .input-group input { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 1em; 
            outline: none; 
            transition: border-color 0.3s;
        }

        .input-group input:focus { 
            border-color: var(--primary); 
        }

        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 1.1em; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: background 0.3s; 
            margin-top: 10px;
        }

        button:hover { 
            background: var(--secondary); 
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .error-msg { 
            color: var(--danger); 
            font-size: 0.85em; 
            margin-top: 15px; 
            display: none; 
            background: #fdedec;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fadbd8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>HOSPITAL POS</h1>
    <p>Acceso a Panel Administrativo</p>
    
    <form id="login-form">
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" required placeholder="admin@hospital.com">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="btn-login">Iniciar Sesión</button>
        <div id="error-msg" class="error-msg">Credenciales incorrectas. Intente de nuevo.</div>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        authDomain: "hospital1-admin.firebaseapp.com",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');

        btn.innerText = "Verificando...";
        btn.disabled = true;
        errorMsg.style.display = 'none';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error de Auth:", error.message);
            errorMsg.style.display = 'block';
            btn.innerText = "Iniciar Sesión";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>

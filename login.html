<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital POS - Iniciar Sesión</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        .login-card h2 { color: #2c3e50; margin-top: 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85em; font-weight: bold; color: #555; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .input-group input:focus { border-color: #27ae60; }
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; font-size: 1em; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #219653; }
        .error-msg { color: #c0392b; font-size: 0.85em; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>HOSPITAL POS</h2>
    <p style="color:#7f8c8d; font-size:0.9em; margin-bottom: 25px;">Acceso a Panel Administrativo</p>
    
    <form id="login-form">
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" required placeholder="admin@hospital.com">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="btn-login">Ingresar</button>
        <div id="error-msg" class="error-msg">Credenciales incorrectas. Intente de nuevo.</div>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0yq1qdkxcOmwCaUxGiFpYj0mUrVQyD-Q",
        authDomain: "hospital1-admin.firebaseapp.com",
        projectId: "hospital1-admin",
        storageBucket: "hospital1-admin.firebasestorage.app",
        messagingSenderId: "804830277427",
        appId: "1:804830277427:web:819463cca4870d32d25846"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');

        btn.innerText = "Verificando...";
        btn.disabled = true;
        errorMsg.style.display = 'none';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Si el login es exitoso, redirigimos al panel principal
            window.location.href = "desktop.html";
        } catch (error) {
            console.error("Error de Auth:", error.message);
            errorMsg.style.display = 'block';
            btn.innerText = "Ingresar";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
